<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SHOPPY – Shop Like Temu</title>
    
    <!-- Tailwind via CDN (you can replace with local version later) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Our custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white font-inter">

<div class="max-w-[1280px] mx-auto px-4 sm:px-6">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-zinc-900 border-b border-zinc-800">
        <div class="flex items-center justify-between py-4">
            <!-- Logo -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center text-2xl font-black">S</div>
                <h1 class="text-3xl sm:text-4xl font-black tracking-tight">SHOPPY</h1>
            </div>

            <!-- Search -->
            <div class="hidden md:block flex-1 max-w-xl mx-6 lg:mx-10">
                <div class="relative">
                    <input id="searchInput" type="text" placeholder="Search products, categories..." 
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-full py-3.5 px-6 pl-5 pr-12 text-base focus:outline-none focus:border-orange-500 transition">
                    <button onclick="performSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 text-orange-500">
                        <i class="fas fa-search text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex items-center gap-5 sm:gap-8 text-base sm:text-lg">
                <span onclick="showPage('home')" class="cursor-pointer hover:text-orange-400 transition">Home</span>
                <span onclick="showPage('shop')" class="cursor-pointer hover:text-orange-400 transition">Shop</span>
                
                <div onclick="toggleCart()" class="relative cursor-pointer hover:text-orange-400 transition flex items-center gap-2">
                    <i class="fas fa-shopping-cart text-xl sm:text-2xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-orange-600 text-white text-xs font-bold min-w-[20px] h-5 rounded-full flex items-center justify-center px-1">0</span>
                </div>

                <div onclick="showAccountModal()" class="flex items-center gap-2 cursor-pointer hover:text-orange-400 transition">
                    <i class="fas fa-user-circle text-2xl sm:text-3xl"></i>
                    <span id="userDisplay" class="hidden sm:inline text-sm font-medium">Guest</span>
                </div>
            </nav>
        </div>
    </header>

    <!-- MAIN -->
    <main class="min-h-screen pb-16">

        <!-- HOME -->
        <div id="homePage" class="page">
            <!-- Hero -->
            <div class="relative h-[70vh] min-h-[500px] bg-gradient-to-br from-orange-700 via-red-700 to-purple-800 flex items-center overflow-hidden rounded-3xl my-8">
                <div class="absolute inset-0 bg-[radial-gradient(#ffffff22_1px,transparent_1px)] [background-size:32px] opacity-30"></div>
                <div class="relative z-10 px-6 sm:px-12 max-w-3xl">
                    <div class="inline-block bg-white/90 text-black px-5 py-2 rounded-full text-lg font-bold mb-6 animate-pulse">⚡ LIMITED TIME DEALS ⚡</div>
                    <h2 class="text-5xl sm:text-7xl font-black leading-tight mb-6">SHOP LIKE TEMU<br>BUT BETTER</h2>
                    <p class="text-xl sm:text-2xl mb-10 opacity-90">Crazy prices • 100+ products • Fast fake checkout</p>
                    <button onclick="showPage('shop')" class="bg-white text-black hover:bg-orange-400 px-10 sm:px-16 py-5 sm:py-7 text-xl sm:text-2xl font-bold rounded-full transition">
                        SHOP NOW →
                    </button>
                </div>
            </div>

            <!-- Flash deals -->
            <section class="py-10">
                <h3 class="text-3xl sm:text-4xl font-bold mb-6">🔥 Flash Deals</h3>
                <div id="flashDeals" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 sm:gap-6"></div>
            </section>
        </div>

        <!-- SHOP -->
        <div id="shopPage" class="page hidden">
            <div class="py-10">
                <div class="flex flex-wrap justify-between items-center gap-4 mb-8">
                    <h2 class="text-4xl sm:text-5xl font-bold">All Products</h2>
                    <div class="flex flex-wrap gap-2 sm:gap-3">
                        <button onclick="filterByCategory('All')" class="category-btn px-5 sm:px-7 py-2.5 bg-orange-600 rounded-full font-semibold text-sm sm:text-base">ALL</button>
                        <button onclick="filterByCategory('Wine')" class="category-btn px-5 sm:px-7 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm sm:text-base">Wine</button>
                        <button onclick="filterByCategory('Clothes')" class="category-btn px-5 sm:px-7 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm sm:text-base">Clothes</button>
                        <button onclick="filterByCategory('Accessories')" class="category-btn px-5 sm:px-7 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm sm:text-base">Accessories</button>
                        <button onclick="filterByCategory('Electronics')" class="category-btn px-5 sm:px-7 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm sm:text-base">Electronics</button>
                    </div>
                </div>
                <div id="productsGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6"></div>
            </div>
        </div>

        <!-- CART MODAL -->
        <div id="cartModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
            <div class="bg-zinc-900 w-full max-w-3xl rounded-3xl max-h-[90vh] overflow-hidden">
                <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
                    <h3 class="text-3xl font-bold">Cart (<span id="modalCartCount">0</span>)</h3>
                    <button onclick="toggleCart()" class="text-4xl hover:text-orange-400">×</button>
                </div>
                <div id="cartItems" class="p-6 max-h-[55vh] overflow-auto space-y-6"></div>
                <div class="p-6 border-t border-zinc-800">
                    <div class="flex justify-between text-2xl font-bold mb-6">
                        <span>Total</span>
                        <span id="cartTotal">$0.00</span>
                    </div>
                    <button onclick="proceedToCheckout()" class="w-full bg-orange-600 hover:bg-orange-700 py-6 text-2xl font-bold rounded-2xl transition">
                        CHECKOUT
                    </button>
                </div>
            </div>
        </div>

        <!-- LOGIN / SIGNUP MODAL -->
        <div id="accountModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
            <div class="bg-zinc-900 w-full max-w-md rounded-3xl p-8">
                <div class="flex justify-between mb-6">
                    <h3 id="modalTitle" class="text-3xl font-bold">Sign In</h3>
                    <button onclick="hideAccountModal()" class="text-4xl">×</button>
                </div>

                <div id="loginForm">
                    <input id="loginUsername" placeholder="Username" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-4 mb-4 text-lg">
                    <input id="loginPassword" type="password" placeholder="Password" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-4 mb-6 text-lg">
                    <button onclick="handleLogin()" class="w-full bg-white text-black py-4 text-xl font-bold rounded-xl mb-4 hover:bg-orange-400 transition">LOGIN</button>
                    <div onclick="switchToSignup()" class="text-center text-orange-400 cursor-pointer">Create account →</div>
                </div>

                <div id="signupForm" class="hidden">
                    <input id="signupUsername" placeholder="Username" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-4 mb-4 text-lg">
                    <input id="signupPassword" type="password" placeholder="Password" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-4 mb-6 text-lg">
                    <button onclick="handleSignup()" class="w-full bg-white text-black py-4 text-xl font-bold rounded-xl mb-4 hover:bg-orange-400 transition">SIGN UP</button>
                    <div onclick="switchToLogin()" class="text-center text-orange-400 cursor-pointer">← Back to login</div>
                </div>

                <div class="mt-8 pt-6 border-t border-zinc-800 text-center">
                    <button onclick="quickAdminLogin()" class="text-sm bg-zinc-800 hover:bg-red-900/50 px-6 py-3 rounded-xl">
                        Admin login (ADMIN / 333222osK$)
                    </button>
                </div>
            </div>
        </div>

    </main>

</div>

<!-- Our JavaScript -->
<script src="script.js"></script>

</body>
</html>
